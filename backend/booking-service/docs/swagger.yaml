basePath: /
definitions:
  internal_handler.CreateBookingRequest:
    properties:
      session_id:
        type: integer
      total_amount:
        type: number
      user_id:
        type: integer
    type: object
  model.Booking:
    properties:
      cancelled_at:
        type: string
      created_at:
        type: string
      id:
        type: integer
      seat_ids:
        items:
          type: integer
        type: array
      session_id:
        type: integer
      snack_ids:
        items:
          type: integer
        type: array
      status:
        type: string
      total_amount:
        type: number
      user_id:
        type: integer
    type: object
host: localhost:8082
info:
  contact: {}
  description: Booking and ticket management microservice for Seatify cinema booking
    platform
  title: Seatify Booking Service API
  version: "1.0"
paths:
  /api/v1/bookings:
    post:
      consumes:
      - application/json
      description: Create a new cinema ticket booking
      parameters:
      - description: Booking request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Booking'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new booking
      tags:
      - bookings
  /api/v1/bookings/{id}:
    get:
      description: Get a specific booking by its ID
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Booking'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get booking by ID
      tags:
      - bookings
  /api/v1/bookings/{id}/cancel:
    post:
      description: Cancel an existing booking
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cancel booking
      tags:
      - bookings
  /api/v1/bookings/user:
    get:
      description: Get all bookings for a specific user
      parameters:
      - description: User ID
        in: query
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Booking'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get user bookings
      tags:
      - bookings
swagger: "2.0"
